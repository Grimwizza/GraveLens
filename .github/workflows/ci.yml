name: GraveLens CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        # Match local dev (Node 24 / npm 11) — npm 10 from Node 20 rejects
        # lockfiles written by npm 11 (missing nested @emnapi entries).
        node-version: 24
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run lint
      run: npm run lint

    - name: Run typecheck
      run: npx tsc --noEmit

    - name: Run tests
      run: npm run test
